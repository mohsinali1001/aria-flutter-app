name: aria_flutter_app
description: ARIA - AI Personal Secretary
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.1.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Firebase
  firebase_core: ^3.3.0
  firebase_auth: ^5.1.0
  google_sign_in: ^6.2.1

  # State management
  flutter_riverpod: ^2.5.1

  # AI & Networking
  dio: ^5.4.3

  # Animations
  flutter_animate: ^4.5.0

  # Local Database (Drift)
  drift: ^2.19.1
  drift_flutter: ^0.1.0
  sqlite3: ^2.7.5
  sqlite3_flutter_libs: ^0.5.28
  path: ^1.9.0
  path_provider: ^2.1.4

  # Auth & Security
  crypto: ^3.0.3
  shared_preferences: ^2.3.2

  # Utilities
  uuid: ^4.4.2
  intl: ^0.19.0
  cupertino_icons: ^1.0.8

  # Environment variables
  flutter_dotenv: ^5.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  build_runner: ^2.4.13
  drift_dev: ^2.19.1

flutter:
  uses-material-design: true
  assets:
    - .env